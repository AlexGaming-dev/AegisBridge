title: "[Q&A] "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Ask your question as clearly and specifically as possible.
      placeholder: What is not working or unclear?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Technical details (OS, version, logs, steps).
      placeholder: Relevant details for reproduction or environment.
