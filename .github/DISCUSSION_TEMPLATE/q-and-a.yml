title: "[Q&A] "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Frage
      description: Stelle deine Frage so konkret wie moeglich.
      placeholder: Was genau funktioniert nicht oder ist unklar?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Kontext
      description: Technische Details (OS, Version, Logs, Schritte).
      placeholder: Relevante Informationen zur Reproduktion oder Umgebung.
