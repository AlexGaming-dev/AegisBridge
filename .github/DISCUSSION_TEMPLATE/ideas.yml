title: "[Idea] "
labels:
  - idea
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should be solved?
      placeholder: Describe the current pain point.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposal
      description: What should the solution look like?
      placeholder: Describe the requested capability.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What value does this provide for users or contributors?
